<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract 连续签到监控站</title>
    <style>
        :root {
            --abs-green: #00D15E;
            --abs-bg: #050705;
            --abs-panel: #0d120e;
            --abs-border: rgba(0, 209, 94, 0.2);
            --text-glow: 0 0 10px rgba(0, 209, 94, 0.5);
        }

        body {
            background-color: var(--abs-bg);
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'Monaco', 'Consolas', monospace;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* 顶部统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--abs-panel);
            border: 1px solid var(--abs-border);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .stat-value { color: var(--abs-green); font-size: 1.8em; font-weight: bold; text-shadow: var(--text-glow); }
        .stat-label { font-size: 0.8em; color: #888; margin-top: 5px; }

        /* 状态控制区 */
        .control-panel {
            background: var(--abs-panel);
            border: 1px solid var(--abs-border);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 表格样式 */
        .table-wrapper { border-radius: 8px; overflow: hidden; border: 1px solid var(--abs-border); }
        table { width: 100%; border-collapse: collapse; background: var(--abs-panel); }
        th { background: rgba(0, 209, 94, 0.1); color: var(--abs-green); padding: 15px; text-align: left; font-size: 0.9em; }
        td { padding: 12px 15px; border-bottom: 1px solid #1a201b; font-size: 0.9em; }
        tr:hover { background: rgba(0, 209, 94, 0.05); }

        .rank-badge { font-weight: bold; width: 30px; display: inline-block; }
        .address-link { color: #aaa; text-decoration: none; border-bottom: 1px solid transparent; }
        .address-link:hover { color: var(--abs-green); border-bottom: 1px solid var(--abs-green); }
        .streak-count { color: var(--abs-green); font-weight: bold; }
        
        .gold-tier { color: #FFD700; background: rgba(255, 215, 0, 0.1); padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--abs-green); text-shadow: var(--text-glow);">ABSTRACT STREAK TRACKER</h1>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="count-60">0</div><div class="stat-label">连续 > 60天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-50">0</div><div class="stat-label">连续 50-60天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-40">0</div><div class="stat-label">连续 40-50天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-total">0</div><div class="stat-label">总扫描地址</div></div>
    </div>

    <div class="control-panel">
        <div id="statusText" style="color: var(--abs-green); font-weight: bold;">正在从云端拉取最新数据...</div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">排名</th>
                    <th>用户地址 (Portal)</th>
                    <th>段位</th>
                    <th style="text-align: right;">当前连续签到</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 页面加载完毕后立即执行
    window.onload = async () => {
        const statusText = document.getElementById('statusText');
        try {
            // 直接读取 GitHub Action 生成好的 results.json，不需要再扫链了！
            const res = await fetch('results.json?v=' + new Date().getTime()); // 加时间戳防止浏览器缓存
            if (!res.ok) throw new Error("获取数据失败");
            
            const results = await res.json();
            
            // 更新统计数据
            updateStats(results);
            // 渲染排行榜
            renderTable(results);
            
            statusText.innerText = `🟢 数据已同步 (更新于 ${new Date().toLocaleTimeString()})`;
        } catch (e) {
            console.error(e);
            statusText.style.color = "red";
            statusText.innerText = "数据加载失败，请检查 results.json 是否已生成。";
        }
    };

    // 统计分布
    function updateStats(results) {
        const counts = { '60': 0, '50': 0, '40': 0 };
        results.forEach(r => {
            if (r.streak >= 60) counts['60']++;
            else if (r.streak >= 50) counts['50']++;
            else if (r.streak >= 40) counts['40']++;
        });
        document.getElementById('count-60').innerText = counts['60'];
        document.getElementById('count-50').innerText = counts['50'];
        document.getElementById('count-40').innerText = counts['40'];
        document.getElementById('count-total').innerText = results.length;
    }

    // 渲染表格排名
    function renderTable(results) {
        // 剔除断签归零的用户，并按天数降序排列
        const validResults = results.filter(r => r.streak > 0).sort((a, b) => b.streak - a.streak);
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        let currentRank = 1;
        validResults.forEach((item, index) => {
            // 密集排名：遇到天数不同才改变名次
            if (index > 0 && item.streak < validResults[index - 1].streak) {
                currentRank = index + 1;
            }
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="rank-badge">${currentRank}</span></td>
                <td><a class="address-link" href="https://portal.abs.xyz/profile/${item.address}" target="_blank">${item.address}</a></td>
                <td><span class="gold-tier">黄金+</span></td>
                <td style="text-align: right;"><span class="streak-count">${item.streak}</span> Days</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>

</body>
</html>
