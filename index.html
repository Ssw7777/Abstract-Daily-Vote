<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract 签到数据看板 | @0xStudy</title>
    <style>
        /* 全局防溢出 */
        * { box-sizing: border-box; }

        :root {
            --abs-primary: #00B359; 
            --abs-primary-light: rgba(0, 179, 89, 0.1);
            /* 将纯白背景改为了 90% 透明度的白色，开启毛玻璃前提 */
            --card-bg: rgba(255, 255, 255, 0.85); 
            --text-main: #2C3E50;
            --text-muted: #636E72;
            --border-color: rgba(234, 237, 237, 0.6);
        }

        body {
            /* 引入你的专属背景图 */
            background: url('Abstract_BG.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-weight: 500;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; position: relative; padding-bottom: 80px; }

        /* 头部模块：项目方Logo + 标题 */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .project-logo {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 2px solid var(--abs-primary);
            box-shadow: 0 4px 12px rgba(0, 179, 89, 0.2);
            object-fit: cover;
            background: #fff; /* 防止透明logo透底 */
        }

        h1 { 
            margin: 0; 
            color: var(--text-main); 
            font-size: 2.4em; 
            font-weight: 900; 
            letter-spacing: 1px;
            /* 给标题加一层白色发光，防止背景图太暗导致看不清文字 */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 5px rgba(255, 255, 255, 0.8);
        }
        h1 span { color: var(--abs-primary); }

        /* 顶部统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr); 
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            /* 核心黑科技：毛玻璃模糊滤镜 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            padding: 18px 5px; 
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }
        .stat-card:hover { 
            transform: translateY(-3px); 
            border-color: var(--abs-primary);
            box-shadow: 0 8px 20px rgba(0, 179, 89, 0.15);
        }
        .stat-value { color: var(--abs-primary); font-size: 1.7em; font-weight: 900; font-family: 'Monaco', 'Consolas', monospace; }
        .stat-label { font-size: 0.78em; color: var(--text-muted); margin-top: 8px; font-weight: 600;}

        /* 特殊强调的卡片 */
        .card-highlight { background: rgba(0, 179, 89, 0.15); border-color: var(--abs-primary); }
        .card-highlight .stat-value { color: var(--text-main); }

        @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

        /* 搜索栏 */
        .control-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(244, 246, 246, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1.05em;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus { 
            background: #FFF;
            border-color: var(--abs-primary); 
            box-shadow: 0 0 0 3px rgba(0, 179, 89, 0.1); 
        }
        .search-box input::placeholder { color: #A6ACAF; font-weight: 500; }

        /* 表格样式 */
        .table-wrapper { 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--border-color); 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: rgba(248, 250, 249, 0.6); 
            color: var(--text-main); 
            padding: 18px 20px; 
            text-align: left; 
            font-size: 1em; 
            font-weight: 800; 
            border-bottom: 2px solid var(--border-color);
        }
        td { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 1em; 
            color: var(--text-main);
            font-weight: 600; 
        }
        tr:hover { background: var(--abs-primary-light); }

        .rank-badge { font-weight: 900; color: var(--text-muted); width: 30px; display: inline-block; }
        .top-rank { color: var(--abs-primary); font-size: 1.1em;}

        .address-link { 
            color: var(--text-main); 
            text-decoration: none; 
            font-family: 'Monaco', 'Consolas', monospace;
            transition: color 0.2s;
            font-weight: 700; 
        }
        .address-link:hover { color: var(--abs-primary); text-decoration: underline; }
        
        .streak-count { 
            color: var(--abs-primary); 
            font-weight: 900; 
            font-size: 1.15em;
            font-family: 'Monaco', 'Consolas', monospace;
        }

        /* 底部信息 */
        .footer-note {
            text-align: left;
            margin-top: 25px;
            color: var(--text-main);
            font-size: 0.9em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* 推特浮窗 */
        .twitter-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--abs-primary);
            color: var(--text-main);
            padding: 8px 20px 8px 10px; 
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .twitter-float:hover {
            transform: translateY(-3px);
            background: #FFF;
            color: var(--abs-primary);
            box-shadow: 0 8px 25px rgba(0, 179, 89, 0.2);
        }
        
        .twitter-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--abs-primary);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <img src="Abstract项目方头像.png" alt="Logo" class="project-logo" onerror="this.style.display='none'">
        <h1>ABSTRACT <span>STREAK</span> TRACKER</h1>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="count-60">0</div><div class="stat-label">连续 60天+</div></div>
        <div class="stat-card"><div class="stat-value" id="count-50">0</div><div class="stat-label">连续 50-60天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-40">0</div><div class="stat-label">连续 40-50天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-30">0</div><div class="stat-label">连续 30-40天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-20">0</div><div class="stat-label">连续 20-30天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-7">0</div><div class="stat-label">连续 7-20天</div></div>
        
        <div class="stat-card card-highlight">
            <div class="stat-value" id="count-over7">0</div>
            <div class="stat-label">符合XP 5%加成</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="count-total">0</div>
            <div class="stat-label">总扫描 (黄金+)</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 粘贴钱包地址 (0x...) 快速查询连签天数与排名...">
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">排名</th>
                    <th>用户地址 (点击跳转Portal)</th>
                    <th style="text-align: right;">当前连续签到</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <tr><td colspan="3" style="text-align:center; padding: 40px; color: #888;">正在加载链上数据...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer-note">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        本看板数据每天自动刷新一次，数据结果仅供参考。
    </div>
</div>

<a href="https://x.com/0xStudy" target="_blank" class="twitter-float">
    <img src="StudyBera.jpg" alt="Study Bera" class="twitter-avatar" onerror="this.style.display='none'">
    Follow @0xStudy
</a>

<script>
    let allData = [];

    window.onload = async () => {
        try {
            const res = await fetch('results.json?v=' + new Date().getTime());
            if (!res.ok) throw new Error("获取数据失败");
            
            allData = await res.json();
            
            updateStats(allData);
            renderTable(allData);
        } catch (e) {
            console.error(e);
            document.getElementById('leaderboardBody').innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color: #E74C3C;">⚠️ 数据加载失败，请检查数据源是否已生成。</td></tr>`;
        }
    };

    function updateStats(results) {
        const counts = { '60': 0, '50': 0, '40': 0, '30': 0, '20': 0, '7': 0, 'over7': 0 };
        
        results.forEach(r => {
            if (r.streak >= 7) counts['over7']++;

            if (r.streak >= 60) counts['60']++;
            else if (r.streak >= 50) counts['50']++;
            else if (r.streak >= 40) counts['40']++;
            else if (r.streak >= 30) counts['30']++;
            else if (r.streak >= 20) counts['20']++;
            else if (r.streak >= 7) counts['7']++;
        });
        
        document.getElementById('count-60').innerText = counts['60'];
        document.getElementById('count-50').innerText = counts['50'];
        document.getElementById('count-40').innerText = counts['40'];
        document.getElementById('count-30').innerText = counts['30'];
        document.getElementById('count-20').innerText = counts['20'];
        document.getElementById('count-7').innerText = counts['7'];
        
        document.getElementById('count-over7').innerText = counts['over7'];
        document.getElementById('count-total').innerText = results.length;
    }

    function renderTable(results, searchTerm = "") {
        let displayData = results.filter(r => r.streak > 0);
        displayData.sort((a, b) => b.streak - a.streak);
        
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        let currentRank = 1;
        let htmlStr = "";
        
        displayData.forEach((item, index) => {
            if (index > 0 && item.streak < displayData[index - 1].streak) {
                currentRank = index + 1;
            }
            if (searchTerm && !item.address.toLowerCase().includes(searchTerm.toLowerCase())) {
                return; 
            }
            const rankClass = currentRank <= 3 ? "rank-badge top-rank" : "rank-badge";

            htmlStr += `
                <tr>
                    <td><span class="${rankClass}">${currentRank}</span></td>
                    <td><a class="address-link" href="https://portal.abs.xyz/profile/${item.address}" target="_blank">${item.address}</a></td>
                    <td style="text-align: right;"><span class="streak-count">${item.streak}</span> 天</td>
                </tr>
            `;
        });
        
        if(htmlStr === "") {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color: #7F8C8D;">没有找到匹配的活跃地址</td></tr>`;
        } else {
            tbody.innerHTML = htmlStr;
        }
    }

    document.getElementById('searchInput').addEventListener('input', function(e) {
        renderTable(allData, e.target.value.trim());
    });
</script>

</body>
</html>
