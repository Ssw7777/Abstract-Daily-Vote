<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract 签到数据看板 | @0xStudy</title>
    <style>
        :root {
            --abs-primary: #00B359; 
            --abs-primary-light: rgba(0, 179, 89, 0.1);
            --bg-color: #F8FAF9; 
            --card-bg: #FFFFFF;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --border-color: #EAEDED;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; position: relative; padding-bottom: 80px; }

        /* 头部模块 */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .project-logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid var(--abs-primary);
            box-shadow: 0 4px 12px rgba(0, 179, 89, 0.2);
        }

        h1 { 
            margin: 0; 
            color: var(--text-main); 
            font-size: 2.2em; 
            font-weight: 800;
            letter-spacing: 1px;
        }
        h1 span { color: var(--abs-primary); }

        /* 顶部统计卡片 - 强制一行显示 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* 强制分成 8 列，保持在一行 */
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px 5px; /* 稍微减小左右内边距，确保能放得下8个 */
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }
        .stat-card:hover { 
            transform: translateY(-3px); 
            border-color: var(--abs-primary);
            box-shadow: 0 6px 16px rgba(0, 179, 89, 0.08);
        }
        .stat-value { color: var(--abs-primary); font-size: 1.6em; font-weight: 800; font-family: 'Monaco', monospace; }
        .stat-label { font-size: 0.75em; color: var(--text-muted); margin-top: 8px; font-weight: 500;}

        /* 特殊强调的卡片 */
        .card-highlight { background: var(--abs-primary-light); border-color: var(--abs-primary); }
        .card-highlight .stat-value { color: var(--text-main); }

        /* 移动端响应式适配：防止屏幕太小时挤成一团 */
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* 搜索栏 */
        .control-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            background: #F4F6F6;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1em;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus { 
            background: #FFF;
            border-color: var(--abs-primary); 
            box-shadow: 0 0 0 3px rgba(0, 179, 89, 0.1); 
        }
        .search-box input::placeholder { color: #95A5A6; }

        /* 表格样式 */
        .table-wrapper { 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--border-color); 
            background: var(--card-bg); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #F8FAF9; 
            color: var(--text-main); 
            padding: 18px 20px; 
            text-align: left; 
            font-size: 0.95em; 
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
        }
        td { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 0.95em; 
            color: var(--text-main);
        }
        tr:hover { background: var(--abs-primary-light); }

        .rank-badge { 
            font-weight: bold; 
            color: var(--text-muted);
            width: 30px; 
            display: inline-block;
        }
        .top-rank { color: var(--abs-primary); font-weight: 900;}

        .address-link { 
            color: var(--text-main); 
            text-decoration: none; 
            font-family: 'Monaco', monospace;
            transition: color 0.2s;
        }
        .address-link:hover { color: var(--abs-primary); text-decoration: underline; }
        
        .streak-count { 
            color: var(--abs-primary); 
            font-weight: 800; 
            font-size: 1.1em;
            font-family: 'Monaco', monospace;
        }

        /* 底部信息与推特浮窗 */
        .footer-note {
            text-align: left;
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .twitter-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .twitter-float:hover {
            transform: translateY(-3px);
            border-color: var(--abs-primary);
            color: var(--abs-primary);
            box-shadow: 0 6px 20px rgba(0, 179, 89, 0.15);
        }
        .twitter-float svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-container">
        <img src="Abstract项目方头像.png" alt="Logo" class="project-logo" onerror="this.style.display='none'">
        <h1>ABSTRACT <span>STREAK</span> TRACKER</h1>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="count-60">0</div><div class="stat-label">连续 60天+</div></div>
        <div class="stat-card"><div class="stat-value" id="count-50">0</div><div class="stat-label">连续 50-60天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-40">0</div><div class="stat-label">连续 40-50天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-30">0</div><div class="stat-label">连续 30-40天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-20">0</div><div class="stat-label">连续 20-30天</div></div>
        <div class="stat-card"><div class="stat-value" id="count-7">0</div><div class="stat-label">连续 7-20天</div></div>
        
        <div class="stat-card card-highlight">
            <div class="stat-value" id="count-over7">0</div>
            <div class="stat-label">符合XP 5%加成</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="count-total">0</div>
            <div class="stat-label">总扫描 (黄金+)</div>
        </div>
    </div>

    <div class="control-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 粘贴钱包地址 (0x...) 快速查询连签天数与排名...">
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">排名</th>
                    <th>用户地址 (Portal)</th>
                    <th style="text-align: right;">当前连续签到</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <tr><td colspan="3" style="text-align:center; padding: 40px; color: #888;">正在加载链上数据...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer-note">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        本看板数据每天自动刷新一次，数据结果仅供参考。
    </div>
</div>

<a href="https://x.com/0xStudy" target="_blank" class="twitter-float">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
    Follow @0xStudy
</a>

<script>
    let allData = [];

    window.onload = async () => {
        try {
            const res = await fetch('results.json?v=' + new Date().getTime());
            if (!res.ok) throw new Error("获取数据失败");
            
            allData = await res.json();
            
            updateStats(allData);
            renderTable(allData);
        } catch (e) {
            console.error(e);
            document.getElementById('leaderboardBody').innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color: #E74C3C;">⚠️ 数据加载失败，请检查数据源是否已生成。</td></tr>`;
        }
    };

    function updateStats(results) {
        const counts = { '60': 0, '50': 0, '40': 0, '30': 0, '20': 0, '7': 0, 'over7': 0 };
        
        results.forEach(r => {
            // 计算大于7天的总计
            if (r.streak >= 7) counts['over7']++;

            // 细分区间计算
            if (r.streak >= 60) counts['60']++;
            else if (r.streak >= 50) counts['50']++;
            else if (r.streak >= 40) counts['40']++;
            else if (r.streak >= 30) counts['30']++;
            else if (r.streak >= 20) counts['20']++;
            else if (r.streak >= 7) counts['7']++;
        });
        
        document.getElementById('count-60').innerText = counts['60'];
        document.getElementById('count-50').innerText = counts['50'];
        document.getElementById('count-40').innerText = counts['40'];
        document.getElementById('count-30').innerText = counts['30'];
        document.getElementById('count-20').innerText = counts['20'];
        document.getElementById('count-7').innerText = counts['7'];
        
        document.getElementById('count-over7').innerText = counts['over7'];
        document.getElementById('count-total').innerText = results.length;
    }

    function renderTable(results, searchTerm = "") {
        // 过滤断签归零的用户
        let displayData = results.filter(r => r.streak > 0);
        
        // 按连续签到天数，从高到低排序
        displayData.sort((a, b) => b.streak - a.streak);
        
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        let currentRank = 1;
        let htmlStr = "";
        
        displayData.forEach((item, index) => {
            if (index > 0 && item.streak < displayData[index - 1].streak) {
                currentRank = index + 1;
            }
            
            if (searchTerm && !item.address.toLowerCase().includes(searchTerm.toLowerCase())) {
                return; 
            }
            
            const rankClass = currentRank <= 3 ? "rank-badge top-rank" : "rank-badge";

            htmlStr += `
                <tr>
                    <td><span class="${rankClass}">${currentRank}</span></td>
                    <td><a class="address-link" href="https://portal.abs.xyz/profile/${item.address}" target="_blank">${item.address}</a></td>
                    <td style="text-align: right;"><span class="streak-count">${item.streak}</span> 天</td>
                </tr>
            `;
        });
        
        if(htmlStr === "") {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 40px; color: #7F8C8D;">没有找到匹配的活跃地址</td></tr>`;
        } else {
            tbody.innerHTML = htmlStr;
        }
    }

    document.getElementById('searchInput').addEventListener('input', function(e) {
        renderTable(allData, e.target.value.trim());
    });
</script>

</body>
</html>
